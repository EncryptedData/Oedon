name: Build
on: [push]
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: 'recursive'
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
      - name: Invoking Vcpkg
        uses: lukka/get-cmake@latest
        with:
          vcpkgDirectory: '${{ github.workspace }}/externals/vcpkg'
          vcpkgJsonGlob: '**/vcpkg.json'
          runVcpkgInstall: true
      - name: Build Windows Debug
        run: msbuild.exe Oedon.sln /property:Configuration=Debug /property:Platform=x64
      - name: Build Windows Release
        run: msbuild.exe Oedon.sln /property:Configuration=Release /property:Platform=x64
