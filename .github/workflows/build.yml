name: Build
on: [push]
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
      - name: Checking out required submodules
        run: git submodule update --init --recursive
      - name: Bootstrapping Repository
        run: .\bootstrap.ps1
      - name: Build Windows Debug
        run: msbuild.exe Oedon.sln /property:Configuration=Debug /property:Platform=x64
      - name: Build Windows Release
        run: msbuild.exe Oedon.sln /property:Configuration=Release /property:Platform=x64
